<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Finance Agent</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css" />
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/sql.min.js"></script>
<style>
  :root {
    --bg: #faf9f5;
    --panel: #ffffff;
    --panel-2: #f5f2ec;
    --text: #1f1e1d;
    --muted: #6f6a5f;
    --accent: #c96442;
    --accent-hover: #b2583a;
    --accent-soft: #f6eee9;
    --border: #e7e2d7;
    --border-strong: #d7d1c3;
    --err: #b0341f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 20px; letter-spacing: -0.2px; }
  h2 { font-size: 12px; color: var(--muted); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  input[type="file"] { color: var(--muted); font: inherit; }
  input[type="file"]::file-selector-button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; margin-right: 10px; cursor: pointer; font: inherit;
  }
  input[type="file"]::file-selector-button:hover { background: #efeae0; }
  input[type="text"], textarea {
    width: 100%; background: #fff; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; font: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none; border-color: var(--border-strong);
    box-shadow: 0 0 0 3px rgba(201, 100, 66, 0.12);
  }
  textarea { min-height: 84px; resize: vertical; }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 9px 16px; font-weight: 500; cursor: pointer; font: inherit;
    transition: background 0.15s ease;
  }
  button:hover { background: var(--accent-hover); }
  button.secondary {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
  }
  button.secondary:hover { background: var(--panel-2); }
  button.link {
    background: transparent; color: var(--accent); padding: 4px 0; border: 0; font-weight: 500;
    text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px;
  }
  button.link:hover { color: var(--accent-hover); background: transparent; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .files { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .pill {
    background: var(--accent-soft); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px 10px; font-size: 12px; color: var(--text);
  }
  .status { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .error { color: var(--err); }
  .message { margin-bottom: 14px; min-width: 0; }
  .bubble {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 15px;
    min-width: 0;
    max-width: 100%;
  }
  .bubble.user { background: var(--panel-2); border-color: var(--border); }
  .role { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; font-weight: 600; }
  .answer { white-space: pre-wrap; line-height: 1.6; font-size: 15px; }
  .citations {
    margin-top: 12px; border-top: 1px solid var(--border);
    padding-top: 12px; display: none;
    min-width: 0;
    max-width: 100%;
  }
  .citations.open { display: block; }
  .cite {
    background: #fdfcf8; border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
    min-width: 0;
    max-width: 100%;
  }
  .cite .meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .cite .content { white-space: pre-wrap; font-size: 14px; line-height: 1.55; }
  .cite pre {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; font-size: 12.5px; margin: 6px 0;
    color: var(--text); overflow-x: auto; max-width: 100%;
  }
  .cite pre code.hljs {
    background: transparent; padding: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 12.5px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .sql-label {
    display: inline-block; font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin: 4px 0 2px;
  }
  .table-scroll {
    overflow-x: auto;
    max-width: 100%;
    margin-top: 8px;
    -webkit-overflow-scrolling: touch;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
  }
  table.rows {
    width: max-content;
    min-width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    background: #fff;
  }
  table.rows th, table.rows td { border: 1px solid var(--border); padding: 5px 9px; text-align: left; }
  table.rows th { background: var(--panel-2); color: var(--muted); font-weight: 600; }
  .muted { color: var(--muted); font-size: 12px; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 12px 0 6px; font-weight: 600; }
  .spinner {
    width: 13px; height: 13px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    display: inline-block; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap; margin-bottom: 16px;
  }
  .topbar h1 { margin: 0; }
  .user-bar { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
  .user-bar strong { color: var(--text); font-weight: 600; }
  #auth-panel .card { max-width: 420px; margin: 0 auto 24px; }
  #app-panel[hidden] { display: none !important; }
  #auth-panel[hidden] { display: none !important; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div id="auth-panel" class="card">
    <h2>Sign in</h2>
    <div id="auth-error" class="status error" style="display:none;"></div>
    <form id="login-form">
      <div class="field">
        <label for="login-user">Username</label>
        <input id="login-user" type="text" name="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="login-pass">Password</label>
        <input id="login-pass" type="password" name="password" autocomplete="current-password" required />
      </div>
      <div class="row">
        <button type="submit">Log in</button>
        <button type="button" id="show-register" class="secondary" style="display:none;">Create account</button>
      </div>
    </form>
    <form id="register-form" hidden>
      <p class="muted" style="margin-top:0;">Password must be at least 8 characters.</p>
      <div class="field">
        <label for="reg-user">Username</label>
        <input id="reg-user" type="text" name="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="reg-pass">Password</label>
        <input id="reg-pass" type="password" name="password" autocomplete="new-password" required minlength="8" />
      </div>
      <div class="row">
        <button type="submit">Register</button>
        <button type="button" id="show-login" class="secondary">Back to log in</button>
      </div>
    </form>
  </div>

  <div id="app-panel" hidden>
  <div class="topbar">
    <h1>Finance Agent</h1>
    <div class="user-bar">
      <span>Signed in as <strong id="current-username"></strong></span>
      <button type="button" id="logout-btn" class="secondary">Log out</button>
    </div>
  </div>

  <div class="card">
    <h2>1. Upload sources (.txt / .csv / .xlsx)</h2>
    <div class="row">
      <input id="file-input" type="file" multiple accept=".txt,.csv,.xlsx" />
      <button id="upload-btn">Upload</button>
      <button id="reset-btn" class="secondary">Clear all</button>
    </div>
    <div id="files" class="files"></div>
    <div id="upload-status" class="status"></div>
  </div>

  <div class="card">
    <h2>2. Ask a question</h2>
    <textarea id="query" placeholder="e.g. What drove the Enterprise Solutions Q3 miss?"></textarea>
    <div class="row" style="margin-top: 8px;">
      <button id="ask-btn">Ask</button>
      <span id="ask-status" class="status"></span>
    </div>
  </div>

  <div id="chat"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const filesEl = $("files");
const uploadStatus = $("upload-status");
const askStatus = $("ask-status");
const chat = $("chat");

const fetchOpts = { credentials: "include" };

async function api(path, options = {}) {
  const r = await fetch(path, { ...fetchOpts, ...options });
  return r;
}

function showAuthError(msg) {
  const el = $("auth-error");
  if (!msg) {
    el.style.display = "none";
    el.textContent = "";
    return;
  }
  el.style.display = "block";
  el.textContent = msg;
}

async function loadAuthConfig() {
  try {
    const r = await api("/auth/config");
    const j = await r.json();
    const btn = $("show-register");
    if (j.allow_registration) btn.style.display = "";
    else btn.style.display = "none";
  } catch (e) {}
}

async function checkSession() {
  const r = await api("/auth/me");
  if (!r.ok) return null;
  return r.json();
}

function showApp(username) {
  $("auth-panel").hidden = true;
  $("app-panel").hidden = false;
  $("current-username").textContent = username;
  showAuthError("");
  refreshFiles();
}

function showLogin() {
  $("auth-panel").hidden = false;
  $("app-panel").hidden = true;
  $("login-form").hidden = false;
  $("register-form").hidden = true;
}

$("show-register").onclick = () => {
  $("login-form").hidden = true;
  $("register-form").hidden = false;
  showAuthError("");
};
$("show-login").onclick = () => {
  $("login-form").hidden = false;
  $("register-form").hidden = true;
  showAuthError("");
};

$("login-form").onsubmit = async (ev) => {
  ev.preventDefault();
  showAuthError("");
  const fd = new FormData(ev.target);
  const r = await api("/auth/login", { method: "POST", body: fd });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) {
    showAuthError(j.detail || "Login failed.");
    return;
  }
  showApp(j.username);
};

$("register-form").onsubmit = async (ev) => {
  ev.preventDefault();
  showAuthError("");
  const fd = new FormData(ev.target);
  const r = await api("/auth/register", { method: "POST", body: fd });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) {
    const d = j.detail;
    showAuthError(typeof d === "string" ? d : (Array.isArray(d) ? d.map(x => x.msg).join(" ") : "Registration failed."));
    return;
  }
  showApp(j.username);
};

$("logout-btn").onclick = async () => {
  await api("/auth/logout", { method: "POST" });
  chat.innerHTML = "";
  renderFiles([]);
  showLogin();
};

(async function init() {
  await loadAuthConfig();
  const me = await checkSession();
  if (me && me.username) showApp(me.username);
  else showLogin();
})();

async function refreshFiles() {
  try {
    const r = await api("/files");
    if (r.status === 401) return;
    const j = await r.json();
    renderFiles(j.files || []);
  } catch (e) {}
}

function renderFiles(files) {
  filesEl.innerHTML = "";
  if (!files.length) {
    filesEl.innerHTML = '<span class="muted">No files uploaded yet.</span>';
    return;
  }
  for (const name of files) {
    const el = document.createElement("span");
    el.className = "pill";
    el.textContent = name;
    filesEl.appendChild(el);
  }
}

$("upload-btn").onclick = async () => {
  const input = $("file-input");
  if (!input.files.length) {
    uploadStatus.innerHTML = '<span class="error">Pick one or more .txt / .csv / .xlsx files.</span>';
    return;
  }
  const fd = new FormData();
  for (const f of input.files) fd.append("files", f);

  uploadStatus.innerHTML = '<span class="spinner"></span>Uploading & indexing…';
  $("upload-btn").disabled = true;
  try {
    const r = await api("/upload", { method: "POST", body: fd });
    const j = await r.json();
    if (!r.ok) throw new Error(j.detail || "Upload failed");
    renderFiles(j.files || []);
    uploadStatus.textContent = `Indexed ${j.uploaded.length} file(s).`;
    input.value = "";
  } catch (e) {
    uploadStatus.innerHTML = `<span class="error">${e.message}</span>`;
  } finally {
    $("upload-btn").disabled = false;
  }
};

$("reset-btn").onclick = async () => {
  if (!confirm("Remove all uploaded files?")) return;
  await api("/reset", { method: "POST" });
  renderFiles([]);
  uploadStatus.textContent = "Cleared.";
};

$("ask-btn").onclick = async () => {
  const q = $("query").value.trim();
  if (!q) return;

  appendMessage("user", q);
  $("query").value = "";
  askStatus.innerHTML = '<span class="spinner"></span>Thinking…';
  $("ask-btn").disabled = true;

  try {
    const fd = new FormData();
    fd.append("q", q);
    const r = await api("/query", { method: "POST", body: fd });
    const j = await r.json();
    if (!r.ok) throw new Error(j.detail || "Query failed");
    appendAnswer(j.answer, j.citations);
    askStatus.textContent = "";
  } catch (e) {
    appendMessage("error", e.message);
    askStatus.textContent = "";
  } finally {
    $("ask-btn").disabled = false;
  }
};

function appendMessage(kind, text) {
  const wrap = document.createElement("div");
  wrap.className = "message";
  const bubble = document.createElement("div");
  bubble.className = "bubble " + (kind === "user" ? "user" : "");
  if (kind === "error") {
    bubble.innerHTML = `<span class="error">${escapeHtml(text)}</span>`;
  } else if (kind === "user") {
    bubble.innerHTML = `<div class="role">You</div><div class="answer">${escapeHtml(text)}</div>`;
  } else {
    bubble.innerHTML = `<div class="answer">${escapeHtml(text)}</div>`;
  }
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
}

function appendAnswer(answer, citations) {
  const wrap = document.createElement("div");
  wrap.className = "message";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  const total = (citations.semantic?.length || 0) + (citations.numeric?.length || 0);

  bubble.innerHTML = `
    <div class="muted">Agent</div>
    <div class="answer">${escapeHtml(answer)}</div>
    ${total > 0 ? `<button class="link toggle-cites">Show citations (${total})</button>` : ""}
    <div class="citations"></div>
  `;

  if (total > 0) {
    const toggle = bubble.querySelector(".toggle-cites");
    const citesEl = bubble.querySelector(".citations");
    citesEl.innerHTML = renderCitations(citations);
    highlightSQL(citesEl);
    toggle.onclick = () => {
      const open = citesEl.classList.toggle("open");
      toggle.textContent = open ? "Hide citations" : `Show citations (${total})`;
    };
  }

  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
}

function renderCitations(c) {
  const parts = [];
  if (c.semantic && c.semantic.length) {
    parts.push('<div class="section-title">Semantic</div>');
    for (const s of c.semantic) {
      const metaBits = [];
      if (s.source_file) metaBits.push(escapeHtml(s.source_file));
      if (s.title) metaBits.push(escapeHtml(s.title));
      if (s.date) metaBits.push(escapeHtml(s.date));
      if (s.author) metaBits.push("by " + escapeHtml(s.author));
      else if (s.participants && s.participants.length) metaBits.push("participants: " + escapeHtml(s.participants.join(", ")));
      parts.push(`
        <div class="cite">
          <div class="meta">${metaBits.join(" &middot; ")}</div>
          <div class="content">${escapeHtml(s.content)}</div>
        </div>
      `);
    }
  }
  if (c.numeric && c.numeric.length) {
    parts.push('<div class="section-title">Numeric</div>');
    for (const n of c.numeric) {
      const pretty = formatSQL(n.sql || "");
      parts.push(`
        <div class="cite">
          <div class="meta">${escapeHtml(n.source_file)}</div>
          <div class="sql-label">SQL</div>
          <pre><code class="language-sql">${escapeHtml(pretty)}</code></pre>
          ${renderTable(n.columns, n.rows)}
        </div>
      `);
    }
  }
  if (!parts.length) return '<div class="muted">No citations.</div>';
  return parts.join("");
}

function renderTable(columns, rows) {
  if (!rows || !rows.length) return '<div class="muted">No rows.</div>';
  const cols = columns && columns.length ? columns : Object.keys(rows[0]);
  const head = cols.map(c => `<th>${escapeHtml(String(c))}</th>`).join("");
  const body = rows.map(r =>
    "<tr>" + cols.map(c => `<td>${escapeHtml(r[c] === null || r[c] === undefined ? "" : String(r[c]))}</td>`).join("") + "</tr>"
  ).join("");
  return `<div class="table-scroll"><table class="rows"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function formatSQL(sql) {
  if (!sql) return "";
  let s = sql.replace(/\s+/g, " ").trim();

  const breakBefore = [
    "WITH", "SELECT", "FROM", "WHERE",
    "GROUP BY", "ORDER BY", "HAVING", "LIMIT", "OFFSET",
    "LEFT JOIN", "RIGHT JOIN", "INNER JOIN", "OUTER JOIN",
    "FULL JOIN", "CROSS JOIN", "JOIN",
    "UNION ALL", "UNION", "INTERSECT", "EXCEPT",
    "ON", "AND", "OR"
  ];

  for (const kw of breakBefore) {
    const re = new RegExp("\\s+" + kw.replace(/ /g, "\\s+") + "\\b", "gi");
    s = s.replace(re, "\n" + kw);
  }

  const indentKeywords = new Set(["ON", "AND", "OR"]);
  return s.split("\n").map(line => {
    const head = line.trim().split(/\s+/)[0]?.toUpperCase() || "";
    return (indentKeywords.has(head) ? "  " : "") + line.trim();
  }).join("\n");
}

function highlightSQL(root) {
  if (!window.hljs) return;
  root.querySelectorAll("pre code.language-sql").forEach(el => {
    try { window.hljs.highlightElement(el); } catch (e) {}
  });
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}
</script>
</body>
</html>
